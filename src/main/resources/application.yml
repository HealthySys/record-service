server:
  port: 8083

spring:
  application:
    name: record-service
  data:
    mongodb:
      uri: mongodb://admin:password@localhost:27017/record_db?authSource=admin
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: record-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:keys/public.pem}

internal:
  auth:
    token: ${INTERNAL_SERVICE_TOKEN:healthsys-internal-dev-token}
  patient-service:
    base-url: ${PATIENT_SERVICE_INTERNAL_BASE_URL:http://patient-service:8082}
